<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PawPath App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="app-container">
        <!-- Top App Bar -->
        <header class="app-header">
            <div class="profile-summary">
                <img src="https://ui-avatars.com/api/?name=Buddy&background=38BDF8&color=fff" alt="Dog Profile">
                <div>
                    <h2>Buddy's Plan</h2>
                    <p>Week 2: Leash Training</p>
                </div>
            </div>
            <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button>
        </header>

        <!-- Main Content Menu (Checklist) -->
        <main class="app-main">
            <h3>Today's Homework</h3>
            <p class="text-muted">Tap to check off tasks.</p>
            
            <ul class="task-list" id="taskList">
                <!-- Tasks will be injected by app.js -->
            </ul>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Progress</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-message"></i>
                <span>Chat</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
